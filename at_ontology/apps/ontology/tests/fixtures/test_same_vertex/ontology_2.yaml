          correct: true
        - answer: Многоагентные системы (MAC)
          correct: true
        - answer: Распределенные интеллектуальные системы различного назначения
          correct: true
        - answer: Интеллектуальные диалоговые системы (ИДС)
          correct: false
        - answer: Расчетно-логические системы (РЛС)
          correct: false
        - answer: 'Экспертная система (Система основанная на знаниях (СОЗ)) '
          correct: false
        - answer: Нет правильного ответа
