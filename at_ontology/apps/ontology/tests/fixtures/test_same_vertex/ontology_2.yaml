  Topic_11:
    label: Общие требования к функциональным возможностям инструментальных средств
      для поддержки разработки динамических интеллектуальных систем
    type: CourceDiscipline.vertex_types.CourseElement
    metadata:
      legacy_db_id: 874
      parent_id: '873'
    properties:
      questions:
      - question: 'G2 позволяет создавать правила следующих типов:'
        difficulty: 1
        answers:
        - answer: initially – реагируют на активацию родительского РП
          correct: true
        - answer: once if – выполняются один раз при выполнении условий
          correct: false
        - answer: if – могут вызываться различными способами при выполнении условий
          correct: true
        - answer: whenever – реагируют на события
          correct: true
        - answer: when – не участвуют ни в прямом, ни в обратном выводе
          correct: true
        - answer: case – выполняются только в одной из веток
          correct: false
        - answer: unconditionally – выполняют свой список действий каждый раз, когда
            вызываются
          correct: true
        - answer: нет правильного ответа
          correct: false
      - question: Какие требования предъявляются к инструментальным средствам для
          разработки динамических интеллектуальных систем (ДИС), функционирующих в
          реальном времени?
        difficulty: 1
        answers:
        - answer: Организация обработки параллельных процессов (рассуждений)
          correct: true
        - answer: Наличие развитых средств для проведения временного (темпорального)
            вывода
          correct: true
        - answer: Формирование распределенных приложений на базе архитектуры «клиент-сервер»
          correct: true
        - answer: Обязательная реализация на языках Lisp или Prolog для обеспечения
            интеллектуальности
          correct: false
        - answer: Нет правильного ответа
          correct: false
      - question: Какие из перечисленных критериев являются основными для выбора эффективных
          инструментальных средств (ИС) для построения динамических интегрированных
          экспертных систем (ИЭС)?
        difficulty: 1
        answers:
        - answer: Интегрированность (легкая интеграция с другими информационными технологиями)
          correct: true
        - answer: Открытость и переносимость
          correct: true
        - answer: Использование языков традиционного программирования и рабочих станций
          correct: true
        - answer: Обязательное использование специализированных Lisp-машин
          correct: false
        - answer: Нет правильного ответа
          correct: false
      - question: Какое из перечисленных требований НЕ является обязательным для инструментальных
          средств разработки динамических интеллектуальных систем?
        difficulty: 1
        answers:
        - answer: Наличие встроенного текстового процессора для документирования
          correct: true
        - answer: Возможность работы в реальном времени
          correct: false
        - answer: Поддержка временного (темпорального) вывода
          correct: false
        - answer: Нет правильного ответа
          correct: false
  Topic_12:
    label: Инструментальная система G2
    type: CourceDiscipline.vertex_types.CourseElement
    metadata:
      legacy_db_id: 875
      parent_id: '873'
    properties:
      questions:
      - question: 'Знания в G2 структурируются следующими способами:'
        difficulty: 1
        answers:
        - answer: иерархия рабочих пространств
          correct: true
        - answer: иерархия процедур
          correct: false
        - answer: иерархия классов
          correct: true
        - answer: иерархия правил
          correct: false
        - answer: иерархия объектов
          correct: false
        - answer: иерархия модулей
          correct: true
        - answer: нет правильного ответа
          correct: false
      - question: 'Примерами исполняемых утверждений среди сущностей в БЗ G2 являются:'
        difficulty: 2
        answers:
        - answer: объекты и их классы
          correct: false
        - answer: формулы
          correct: true
        - answer: процедуры
          correct: true
        - answer: связи
          correct: false
        - answer: отношения
          correct: false
        - answer: правила
          correct: true
        - answer: нет правильного ответа
          correct: false
      - question: 'G2 может инициировать правило, когда:'
        difficulty: 3
        answers:
        - answer: данные, на которые есть ссылка в консеквенте правила, изменились
          correct: false
        - answer: активировано родительское РП для правила типа initially
          correct: true
        - answer: БЗ выполнила действие focus или invoke, которое использует имя объекта,
            класса объекта или категории правил, ассоциированной с правилом
          correct: true
        - answer: появился новый объект типа, используемого в общем правиле
          correct: false
        - answer: БЗ нуждается в значении для переменной, значение которой присваивается
            в консеквенте какого-либо правила
          correct: true
        - answer: в ходе прямого вывода выполнились условия анцедента правила типа
            when
          correct: false
        - answer: данные, на которые есть ссылка в анцеденте правила, изменились
          correct: true
        - answer: G2 определило событие, которое проверяется в анцеденте правила типа
            whenever
          correct: true
        - answer: прошел временной интервал, определенный для правила, инициируемого
            через сканирование
          correct: true
        - answer: нет правильного ответа
          correct: false
  Topic_13:
    label: Общая характеристика проблемно-ориентированных средств на базе G2
