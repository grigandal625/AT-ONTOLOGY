  Topic_19:
    label: Анализ направлений исследований в области динамических интегрированных
      экспертных систем
    type: CourceDiscipline.vertex_types.CourseElement
    metadata:
      legacy_db_id: 885
      parent_id: '866'
    properties:
      questions:
      - question: Какие новые требования предъявляются к интегрированным экспертным
          системам, функционирующим в реальном времени (ИЭС РВ)?
        difficulty: 2
        answers:
        - answer: представление изменяющихся во времени данных, поступающих от внешних
            источников
          correct: true
        - answer: хранение изменяющихся во времени данных, поступающих от внешних
            источников
          correct: true
        - answer: анализ изменяющихся во времени данных, поступающих от внешних источников
          correct: true
        - answer: выполнение одновременных временных рассуждений о нескольких различных
            асинхронных процессах (задачах)
          correct: true
        - answer: возможность моделирования внешнего мира и различных его состояний
          correct: true
        - answer: предоставление Естественно-языкового интерфейса для общения с системой
          correct: false
        - answer: обработка различных типов НЕ-факторов знаний (неопределённых, нечетких)
          correct: false
        - answer: нет правильного ответа
          correct: false
  Topic_20:
    label: Анализ современных исследований в области многоагентных систем
    type: CourceDiscipline.vertex_types.CourseElement
    metadata:
      legacy_db_id: 886
      parent_id: '866'
    properties:
      questions:
      - question: 'Парадигма современных интеллектуальных систем (ИнСист) рассматривает
          архитектуру как: ... ?'
        difficulty: 2
        answers:
        - answer: децентранизованную
          correct: true
        - answer: распределенную
          correct: true
        - answer: групповую
          correct: true
        - answer: независимую
          correct: false
        - answer: нет правильного ответа
          correct: false
      - question: В контексте искусственной жизни выделяются такие области исследований
          как ...?
        difficulty: 3
        answers:
        - answer: анализ и моделирование основных принципов организации живого
          correct: true
        - answer: изучение динамики сложных явлений методами теории клеточных автоматов
            и теории нелинейных дифференциальных уравнений
          correct: true
        - answer: моделирование эволюции популяции с помощью генетических алгоритмов
            и классификаторов
          correct: true
        - answer: разработка автономных агентов, способных к адаптации и действиям
            в плохо определенной среде
          correct: true
        - answer: моделирование эмергентных MAC, возникающих на основе реактивных
            агентов
          correct: true
        - answer: моделирование искусственных экосистем, состоящих только из физических
            объектов
          correct: false
        - answer: разработка биологических организмов с помощью искусственного интеллекта
          correct: false
        - answer: нет правильного ответа
          correct: false
      - question: В каких основных направлениях ИИ развиваются современные многоагентные
          системы(МАС)?
        difficulty: 2
        answers:
        - answer: Искусственной жизни
          correct: true
        - answer: Распределенный искусственный интеллект (РИИ)
          correct: true
        - answer: Централизованный искусственный интеллект
          correct: false
        - answer: Нет правильного ответа
          correct: false
  Topic_21:
    label: Основные понятия и определения ДИС
    type: CourceDiscipline.vertex_types.CourseElement
    metadata:
      legacy_db_id: 887
      parent_id: '868'
    properties:
      questions:
      - question: Динамическиу интеллектуальные системы (ДИС) – это ... ?
        difficulty: 1
        answers:
        - answer: это системы, которые, с одной стороны, удовлетворяют определениям
            динамической системы, а с другой – состояния Si и функции перехода из
            одного состояния в другое Pi могут описываться формализмами ИИ
          correct: true
        - answer: Это системы, которые изменяются со временем и используют алгоритмы
            ИИ только для анализа статических данных
          correct: false
        - answer: Это системы, которые изменяются со временем, но их состояния фиксированы
            и не зависят от предыдущих состояний
          correct: false
        - answer: Нет правильного ответа
          correct: false
      - question: С помощью каких семейств функций задаются состояния динамических
          интеллектуальных систем (ДИС) при классическом подходе?
        difficulty: 1
        answers:
        - answer: Семейство функций реакций системы
          correct: true
        - answer: Семейство функций перехода системы
          correct: true
        - answer: Семейство функций обработки информации
          correct: false
        - answer: Семейство функций оптимизации
          correct: false
        - answer: Нет правильного ответа
          correct: false
      - question: Что используется для задания функций реакций системы и функций перехода
          системы при подходе с позиций ИИ?
        difficulty: 1
        answers:
        - answer: База знаний
          correct: true
        - answer: Нейронные сети
          correct: true
        - answer: Генетические алгоритмы
          correct: true
        - answer: Жестко заданные таблицы переходов
          correct: false
        - answer: Алгоритмы с фиксированными правилами
          correct: false
        - answer: Нет правильного ответа
          correct: false
      - question: Чем описываются состояния (Si)?
        difficulty: 1
        answers:
        - answer: параметрами и переменными, имеющими символьный характер
          correct: true
        - answer: постоянными значениями, которые не изменяются
          correct: false
        - answer: списками всех возможных состояний системы
          correct: false
        - answer: только числовыми значениями
          correct: false
        - answer: нет правильного ответа
          correct: false
